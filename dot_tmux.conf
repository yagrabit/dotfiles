# ============================
# tmux設定
# ============================

# プレフィックスキーをCtrl+qに変更
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# 設定ファイルのリロード
bind r source-file ~/.tmux.conf \; display "設定をリロードしました"

# ============================
# ウィンドウとペインの設定
# ============================

# ウィンドウ番号を1から開始
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウ番号を自動的に振り直す
set -g renumber-windows on

# ペイン分割（直感的なキーバインド）
bind | split-window -h -p 25 -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 新しいウィンドウで現在のパスを維持
bind c new-window -c "#{pane_current_path}"

# テンプレート付きウィンドウ作成（上下50%、左上70%右上30%）
bind C new-window -c "#{pane_current_path}" \; \
  split-window -v -p 50 -c "#{pane_current_path}" \; \
  select-pane -t 1 \; \
  split-window -h -p 30 -c "#{pane_current_path}" \; \
  select-pane -t 1

# ============================
# ペイン間の移動（Vim風）
# ============================

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ============================
# ウィンドウ間の移動
# ============================

bind n next-window
bind p previous-window

# ============================
# ペインのリサイズ
# ============================

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================
# マウス操作を有効化
# ============================

set -g mouse on

# ============================
# コピーモード（Vim風）
# ============================

setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ============================
# ビジュアル設定
# ============================

# 256色サポート
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ステータスバーの位置（上部）
set -g status-position top

# ステータスバーの更新間隔
set -g status-interval 1

# ============================
# ステータスバーのデザイン
# ============================

set -g status-bg colour235
set -g status-fg colour255

# 左側: セッション名
set -g status-left-length 40
set -g status-left "#[fg=colour255,bg=colour241,bold] #S #[fg=colour241,bg=colour235]"

# 右側: 日時
set -g status-right-length 150
set -g status-right "#(~/.config/tmux/claude-monitor-status.sh)#[fg=colour241,bg=colour235]#[fg=colour255,bg=colour241] %Y-%m-%d %H:%M:%S "

# ウィンドウリスト
setw -g window-status-format "#[fg=colour244,bg=colour235] #I:#W "
setw -g window-status-current-format "#[fg=colour235,bg=colour31]#[fg=colour255,bg=colour31,bold] #I:#W #[fg=colour31,bg=colour235]"

# ============================
# ペインボーダー
# ============================

set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour31

# ペインボーダーにタイトルを表示（上部）
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=colour31 bold]●,#[fg=colour245]○} #{pane_index}:#{pane_current_command} #{s|$HOME|~|:pane_current_path} "

# 非アクティブペインの文字色を薄くして視覚的に区別
set -g window-style "fg=colour245"
set -g window-active-style "fg=terminal"

# ============================
# tpm (tmux plugin manager)
# ============================

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'

# tmux-fzf: fzfポップアップでセッション/ウィンドウ切り替え
set-environment -g TMUX_FZF_LAUNCH_KEY "C-f"
set -g @plugin 'sainnhe/tmux-fzf'
bind f run-shell -b "~/.local/share/tmux/plugins/tmux-fzf/scripts/window.sh switch"

# ウィンドウ名をGitリポジトリ名に自動設定
set -g @plugin 'ikorihn/tmux-rename-window-project'

# ============================
# その他の設定
# ============================

# フォーカスイベントの有効化（Neovimのautoread等に必要）
set -g focus-events on

# Escキーの遅延を減らす（Vimユーザー向け）
set -sg escape-time 0

# 履歴の上限を増やす
set -g history-limit 10000

# アクティビティの通知
setw -g monitor-activity on
set -g visual-activity off

# ============================
# tpm初期化（設定の最後に配置）
# ============================

if "test ! -d ~/.local/share/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm && ~/.local/share/tmux/plugins/tpm/bin/install_plugins'"
run-shell "~/.local/share/tmux/plugins/tpm/tpm"

# ============================
# tmux popupでツール呼び出し
# （tpm初期化後に配置し、プラグインによる上書きを防止）
# ============================

# Prefix + g: tigをポップアップで起動（差分確認・コミット）
bind g popup -w90% -h90% -d '#{pane_current_path}' -E 'tig'

# Prefix + t: fzfでファイル検索
bind t popup -w90% -h90% -d '#{pane_current_path}' -E 'fzf'

# Prefix + a: Claude Code監視ポップアップ
bind a popup -w80% -h60% -E '~/.config/tmux/claude-monitor-popup.sh'

# Prefix + e: ポップアップターミナル（単発コマンド実行・ファイル編集用）
bind e popup -w90% -h90% -d '#{pane_current_path}' -E

# Prefix + E: fzf+glowでMarkdownプレビュー（Claude編集履歴 + プロジェクト内MD）
bind E popup -w90% -h90% -d '#{pane_current_path}' -E '~/.config/tmux/glow-preview.sh'
