# 環境別設定フラグ
# マシン固有のオーバーライドは ~/.config/chezmoi/chezmoi.toml [data] セクションで行う

# Codex連携（OpenAI Codex CLI + codex-plugin-cc）
# true にする場合: ~/.config/chezmoi/chezmoi.toml に以下を追加
#   [data]
#   codex_enabled = true
codex_enabled: false

# UX系スキルが参照する外部リポジトリのパス
ux_skill_repo: "ghq/github.com/yagrabit/ui-ux-pro-max-skill"
